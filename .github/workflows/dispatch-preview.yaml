name: Trigger preview site update

on:
  push:
    paths-ignore:
      - ".github/**"
    branches:
      - feature/preview-cloud-lake

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: trigger preview docs.tidb.io workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_STAGING }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'pingcap',
              repo: 'docs-staging',
              workflow_id: 'update-nextgen.yml',
              ref: 'nextgen',
              inputs: {
                repo: 'pingcap/docs',
                branch: 'feature/preview-cloud-lake'
              }
            })
